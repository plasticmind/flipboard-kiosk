<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Split-Flap Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/flap.css">
</head>
<body>
  <div class="board" data-size="large">
    <!-- Rows and flaps are generated by JS -->
  </div>

  <div class="debug-bar">
    <div class="debug-group">
      <label class="debug-label" for="mode-select">Mode</label>
      <select id="mode-select" class="debug-select">
        <option value="message" selected>Message</option>
        <option value="time">Time</option>
        <option value="date">Date</option>
      </select>
    </div>
    <div class="debug-group">
      <label class="debug-label" for="msg-input">Message</label>
      <input type="text" id="msg-input" class="debug-input" value="HELLO WORLD" placeholder="Type a message..." autocomplete="off" spellcheck="false">
    </div>
    <div class="debug-group">
      <label class="debug-label" for="size-select">Size</label>
      <select id="size-select" class="debug-select">
        <option value="large">Large</option>
        <option value="medium">Medium</option>
        <option value="small" selected>Small</option>
      </select>
    </div>
    <div class="debug-group">
      <label class="debug-label" for="speed-select">Speed</label>
      <select id="speed-select" class="debug-select">
        <option value="slow">Slow</option>
        <option value="normal">Normal</option>
        <option value="fast" selected>Fast</option>
        <option value="ludicrous">Ludicrous</option>
      </select>
    </div>
    <div class="debug-group">
      <label class="debug-label" for="sound-select">Sound</label>
      <select id="sound-select" class="debug-select">
        <option value="mechanical" selected>Mechanical</option>
        <option value="whoosh">Whoosh</option>
        <option value="soft">Soft</option>
        <option value="clatter">Clatter</option>
        <option value="off">Off</option>
      </select>
    </div>
    <button id="replay" class="debug-btn debug-btn--action">Replay</button>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
